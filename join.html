<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Join Iron Peak Gym and transform your life today.">
    <title>Join Now | IRON PEAK GYM</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@400;700;900&display=swap"
        rel="stylesheet">
</head>

<body class="subpage">
    <header id="header">
        <nav class="navbar">
            <div class="logo">IRON<span>PEAK</span></div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="pricing.html">Pricing</a></li>
                <li><a href="testimonials.html">Testimonials</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <a href="join.html" class="cta-btn small">Join Now</a>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>
    </header>

    <main>
        <section class="page-banner">
            <h1>JOIN THE <span>ELITE</span></h1>
        </section>

        <section class="join-registration">
            <div class="registration-container">
                <div class="registration-form-box">
                    <h2>SECURE YOUR MEMBERSHIP</h2>
                    <form class="registration-form">
                        <div class="form-row">
                            <input type="text" placeholder="First Name" required>
                            <input type="text" placeholder="Last Name" required>
                        </div>
                        <input type="email" placeholder="Email Address" required>
                        <input type="tel" placeholder="Phone Number" required>
                        <select required>
                            <option value="" disabled selected>Select Membership Plan</option>
                            <option value="basic">Basic - $29/mo</option>
                            <option value="pro">Pro - $59/mo</option>
                            <option value="elite">Elite - $99/mo</option>
                        </select>
                        <div class="checkbox-group">
                            <input type="checkbox" id="terms" required>
                            <label for="terms">I agree to the terms and conditions</label>
                        </div>
                        <button type="submit" class="cta-btn">Complete Registration</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-logo">IRON<span>PEAK</span></div>
            <p>&copy; 2026 IRON PEAK GYM. All rights reserved.</p>
            <div class="socials">
                <a href="#">IG</a>
                <a href="#">FB</a>
                <a href="#">TW</a>
            </div>
        </div>
    </footer>

    <script src="main.js"></script>
</body>

</html>
